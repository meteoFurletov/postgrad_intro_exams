<div id="notes-explorer" class="notes-explorer">
    <div class="notes-explorer-header">
        <div class="notes-explorer-titlebar">
            <h3>Каталог</h3>
            <div class="tree-tools">
                <button type="button" class="tree-tool" id="tree-expand" title="Развернуть всё"
                    aria-label="Развернуть все папки">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" aria-hidden="true">
                        <path d="m7 15 5 5 5-5" />
                        <path d="m7 9 5-5 5 5" />
                    </svg>
                </button>
                <button type="button" class="tree-tool" id="tree-collapse" title="Свернуть всё"
                    aria-label="Свернуть все папки">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" aria-hidden="true">
                        <path d="m7 20 5-5 5 5" />
                        <path d="m7 4 5 5 5-5" />
                    </svg>
                </button>
            </div>
        </div>
        <input id="notes-filter" type="search" placeholder="Фильтр…  ( / )" aria-label="Фильтр заметок" />
    </div>

    <div class="notes-explorer-section">
        <div id="tree-notes" class="tree"></div>
        <div id="data-notes" hidden>
            {% for f in site.static_files %}{% if f.path contains '/Notes/' and f.extname == '.md' %}
            <span data-path="{{ f.path }}"></span>
            {% endif %}{% endfor %}
        </div>
    </div>
</div>

<script>
    (function () {
        const BASE = '{{ site.baseurl | default: "" }}';
        const OPEN_KEY = 'notes:openFolders';

        // Enumerate notes from static files
        const NOTES_PATHS = Array.from(document.querySelectorAll('#data-notes [data-path]')).map(el => el.getAttribute('data-path'));
        const NOTES = (NOTES_PATHS || []).sort().map(p => ({ path: p }));

        // Reading order (depth-first, as displayed) + path→title map, filled after render
        let ORDER = [];
        const TITLES = {};
        let currentPath = null;
        let HEADS = [];          // headings of the note currently shown (for scroll-spy)

        const $id = (id) => document.getElementById(id);
        function prefersReduced() {
            try { return matchMedia('(prefers-reduced-motion: reduce)').matches; } catch (e) { return false; }
        }

        // ---- Utilities ----------------------------------------------------
        function normalizePath(p) {
            let out = p || '';
            if (BASE && out.startsWith(BASE)) out = out.slice(BASE.length);
            if (!out.startsWith('/')) out = '/' + out;
            return out;
        }

        // Natural sort: numbers compared numerically, text via locale.
        function naturalSort(a, b) {
            const aParts = a.split(/(\d+)/);
            const bParts = b.split(/(\d+)/);
            for (let i = 0; i < Math.max(aParts.length, bParts.length); i++) {
                const aPart = aParts[i] || '';
                const bPart = bParts[i] || '';
                if (aPart === bPart) continue;
                const aNum = parseInt(aPart, 10);
                const bNum = parseInt(bPart, 10);
                if (!isNaN(aNum) && !isNaN(bNum)) return aNum - bNum;
                return aPart.localeCompare(bPart);
            }
            return 0;
        }
        // Only the top-level blocks are reversed (Блок 3 → 0). Files and nested
        // folders keep their natural ascending order (01, 02, 03 …).
        const sortDesc = (a, b) => naturalSort(b, a);

        function titleFromPart(part) {
            return part.replace(/\.(md|html)$/i, '');
        }

        function slugify(s) {
            return (s || '').toLowerCase().replace(/[^\p{L}\p{N}]+/gu, '-').replace(/^-+|-+$/g, '') || 'section';
        }

        // ---- Build tree ---------------------------------------------------
        function toTree(items) {
            const root = { dirs: {}, files: [] };
            for (const it of items) {
                const path = it.path;
                const after = path.split('/Notes/')[1] || '';
                if (!after) continue;
                const parts = after.split('/');
                let node = root;
                for (let i = 0; i < parts.length; i++) {
                    const seg = parts[i];
                    const last = i === parts.length - 1;
                    if (last) {
                        node.files.push({ title: titleFromPart(seg), path });
                    } else {
                        node.dirs[seg] = node.dirs[seg] || { dirs: {}, files: [] };
                        node = node.dirs[seg];
                    }
                }
            }
            return root;
        }

        function renderTree(container, tree) {
            container.innerHTML = '';
            const ul = document.createElement('ul');
            ul.className = 'tree-list';

            function renderNode(node, parent, depth, prefix) {
                // Files first — always ascending (01, 02, 03 …)
                const files = (node.files || []).slice().sort((a, b) => naturalSort(a.title, b.title));
                for (const f of files) {
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.textContent = f.title;
                    a.href = '#' + encodeURI(normalizePath(f.path));
                    a.dataset.path = normalizePath(f.path);
                    a.classList.add('vscode-file');
                    a.addEventListener('click', (e) => {
                        e.preventDefault();
                        selectAndLoad(a.dataset.path);
                    });
                    li.appendChild(a);
                    parent.appendChild(li);
                }

                // Directories after files. Reverse ONLY the top-level blocks
                // (depth 0); nested folders stay in natural ascending order.
                const dirNames = Object.keys(node.dirs || {}).sort(depth === 0 ? sortDesc : naturalSort);
                for (const name of dirNames) {
                    const key = prefix + '/' + name;
                    const details = document.createElement('details');
                    details.dataset.path = key;
                    const summary = document.createElement('summary');
                    summary.textContent = name;
                    details.appendChild(summary);
                    const inner = document.createElement('div');
                    inner.className = 'tree-children';
                    details.appendChild(inner);
                    parent.appendChild(details);
                    renderNode(node.dirs[name], inner, depth + 1, key);
                }
            }

            renderNode(tree, ul, 0, '');
            container.appendChild(ul);
        }

        // ---- Folder open/closed persistence -------------------------------
        function readOpen() {
            try { const s = localStorage.getItem(OPEN_KEY); return s ? new Set(JSON.parse(s)) : null; }
            catch (e) { return null; }
        }
        function writeOpen(set) {
            try { localStorage.setItem(OPEN_KEY, JSON.stringify(Array.from(set))); } catch (e) { }
        }
        // Capture the current expansion. Called only from genuine user actions
        // (a summary click, or the expand/collapse-all buttons) — never from
        // programmatic opens (filter, navigation, restore), which must not
        // clobber the user's saved set. Skipped while a filter is active so a
        // filter-expanded view isn't mistaken for the user's intent.
        function persistOpen() {
            const filterEl = $id('notes-filter');
            if (filterEl && filterEl.value.trim()) return;
            const tree = $id('tree-notes');
            if (!tree) return;
            const set = new Set();
            tree.querySelectorAll('details[data-path]').forEach(d => { if (d.open) set.add(d.dataset.path); });
            writeOpen(set);
        }
        // Apply saved state, or default (top-level blocks open) on first visit.
        function applyFolderState() {
            const tree = $id('tree-notes');
            if (!tree) return;
            const saved = readOpen();
            tree.querySelectorAll('details[data-path]').forEach(d => {
                d.style.display = '';
                const depth = (d.dataset.path.match(/\//g) || []).length - 1;
                d.open = saved ? saved.has(d.dataset.path) : depth === 0;
            });
        }
        function setAllFolders(open) {
            const tree = $id('tree-notes');
            if (!tree) return;
            tree.querySelectorAll('details').forEach(d => { d.style.display = ''; d.open = open; });
            persistOpen();
        }

        // ---- Active highlight + auto-scroll -------------------------------
        let activeLink = null;
        function setActive(path) {
            const container = $id('notes-explorer');
            if (!container) return;
            if (activeLink) activeLink.classList.remove('active');
            activeLink = container.querySelector(`a[data-path="${CSS.escape(path)}"]`);
            if (activeLink) {
                activeLink.classList.add('active');
                let el = activeLink;
                while (el && el !== container) {
                    if (el.tagName === 'DETAILS') el.open = true;
                    el = el.parentElement;
                }
                try { activeLink.scrollIntoView({ block: 'nearest' }); } catch (e) { }
            }
        }

        // ---- Filter -------------------------------------------------------
        function filterContainer(container, ql) {
            let anyVisible = false;
            container.querySelectorAll(':scope > li').forEach(li => {
                const a = li.querySelector('a[data-path]');
                const match = !ql || (a && a.textContent.toLowerCase().includes(ql));
                li.style.display = match ? '' : 'none';
                if (match) anyVisible = true;
            });
            container.querySelectorAll(':scope > details').forEach(d => {
                const summary = d.querySelector(':scope > summary');
                const nameMatch = !ql || (summary && summary.textContent.toLowerCase().includes(ql));
                const inner = d.querySelector(':scope > .tree-children');
                const childVisible = inner ? filterContainer(inner, ql) : false;
                const show = nameMatch || childVisible;
                d.style.display = show ? '' : 'none';
                if (childVisible) d.open = true;
                if (show) anyVisible = true;
            });
            return anyVisible;
        }
        function filterTrees(q) {
            const ql = (q || '').trim().toLowerCase();
            const tree = $id('tree-notes');
            if (!tree) return;
            // Filter-driven opens are programmatic — persistOpen is bypassed while
            // a query is present, and applyFolderState restores the saved state on clear.
            tree.querySelectorAll(':scope > ul').forEach(ul => filterContainer(ul, ql));
            if (!ql) applyFolderState();
        }

        // ---- Viewer + loader ----------------------------------------------
        async function fetchText(url) {
            const res = await fetch(encodeURI(url), { cache: 'no-store' });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return await res.text();
        }

        function rewriteRelativeResources(root, notePath) {
            const relDir = notePath.slice(0, notePath.lastIndexOf('/') + 1);
            const baseDir = (BASE || '') + relDir;
            root.querySelectorAll('img[src]').forEach(img => {
                const src = img.getAttribute('src');
                if (!src || /^(https?:|data:|\/|#)/i.test(src)) return;
                img.setAttribute('src', baseDir + src);
            });
            root.querySelectorAll('a[href]').forEach(a => {
                const href = a.getAttribute('href');
                if (!href || /^(https?:|mailto:|tel:|#|\/)/i.test(href)) return;
                a.setAttribute('href', baseDir + href);
            });
        }

        async function typesetMath(el) {
            try {
                if (window.__mjReady) await window.__mjReady;
                if (window.MathJax && window.MathJax.typesetPromise) {
                    await window.MathJax.typesetPromise([el]);
                } else if (window.MathJax && window.MathJax.Hub && window.MathJax.Hub.Queue) {
                    window.MathJax.Hub.Queue(["Typeset", window.MathJax.Hub, el]);
                }
            } catch (e) { /* ignore typeset errors */ }
        }

        function wrapTables(root) {
            root.querySelectorAll('table').forEach(t => {
                if (t.parentElement && t.parentElement.classList.contains('table-scroll')) return;
                const wrap = document.createElement('div');
                wrap.className = 'table-scroll';
                t.replaceWith(wrap);
                wrap.appendChild(t);
            });
        }

        // Protect $…$ / $$…$$ math from Markdown. Without this, marked treats TeX
        // like ~ (\mathrm{mm~Hg}), _ (T_p) and * as strikethrough/emphasis and
        // injects HTML into the formula, so MathJax can't render it. We tokenise
        // math as opaque spans and emit the raw TeX (HTML-escaped) for MathJax.
        let markedMathReady = false;
        function setupMarkedMath() {
            if (markedMathReady || !window.marked || !window.marked.use) return;
            const esc = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            window.marked.use({
                extensions: [
                    {
                        name: 'mathBlock', level: 'block',
                        start(src) { const i = src.indexOf('$$'); return i < 0 ? undefined : i; },
                        tokenizer(src) {
                            const m = /^\$\$([\s\S]+?)\$\$/.exec(src);
                            if (m) return { type: 'mathBlock', raw: m[0], text: m[1] };
                        },
                        renderer(t) { return '$$' + esc(t.text) + '$$'; }
                    },
                    {
                        name: 'mathInline', level: 'inline',
                        start(src) { const i = src.indexOf('$'); return i < 0 ? undefined : i; },
                        tokenizer(src) {
                            const m = /^\$((?:\\.|[^$\\\n])+?)\$/.exec(src);
                            if (m) return { type: 'mathInline', raw: m[0], text: m[1] };
                        },
                        renderer(t) { return '$' + esc(t.text) + '$'; }
                    }
                ]
            });
            markedMathReady = true;
        }

        // ---- Outline (table of contents) ----------------------------------
        function buildOutline() {
            const viewer = $id('note-viewer');
            const list = $id('note-outline-list');
            const outline = $id('note-outline');
            const container = document.querySelector('.notes-container');
            if (!viewer || !list || !outline || !container) return;
            const heads = Array.from(viewer.querySelectorAll('h2, h3'));
            list.innerHTML = '';
            HEADS = [];
            if (heads.length < 2) {
                container.classList.remove('has-outline');
                outline.hidden = true;
                return;
            }
            const used = {};
            heads.forEach(h => {
                let id = h.id;
                if (!id) {
                    id = slugify(h.textContent);
                    if (used[id] != null) { used[id]++; id = id + '-' + used[id]; } else { used[id] = 0; }
                    h.id = id;
                }
                HEADS.push(h);
                const a = document.createElement('a');
                a.className = 'note-outline__link lvl-' + h.tagName.toLowerCase();
                a.href = '#';
                a.textContent = h.textContent;
                a.dataset.target = id;
                a.addEventListener('click', (e) => {
                    e.preventDefault();
                    const reader = $id('reader');
                    const t = document.getElementById(id);
                    if (reader && t) {
                        const top = t.getBoundingClientRect().top - reader.getBoundingClientRect().top + reader.scrollTop - 10;
                        reader.scrollTo({ top, behavior: prefersReduced() ? 'auto' : 'smooth' });
                    }
                });
                list.appendChild(a);
            });
            container.classList.add('has-outline');
            outline.hidden = false;
            updateSpy();
        }

        function updateSpy() {
            const list = $id('note-outline-list');
            const reader = $id('reader');
            if (!list || !reader || !HEADS.length) return;
            const rTop = reader.getBoundingClientRect().top;
            let activeId = HEADS[0].id;
            for (const h of HEADS) {
                if (h.getBoundingClientRect().top - rTop <= 90) activeId = h.id; else break;
            }
            list.querySelectorAll('a').forEach(l => l.classList.toggle('active', l.dataset.target === activeId));
        }

        // ---- Reading progress ---------------------------------------------
        function updateProgress() {
            const reader = $id('reader');
            const bar = $id('reading-bar');
            if (!reader || !bar) return;
            const max = reader.scrollHeight - reader.clientHeight;
            const p = max > 8 ? reader.scrollTop / max : 0;
            bar.style.width = (Math.min(1, Math.max(0, p)) * 100).toFixed(2) + '%';
        }

        // ---- Prev / Next pager --------------------------------------------
        function neighbor(path, delta) {
            const i = ORDER.indexOf(normalizePath(path));
            if (i < 0) return null;
            const j = i + delta;
            return (j >= 0 && j < ORDER.length) ? ORDER[j] : null;
        }
        function makePagerLink(path, dir) {
            const a = document.createElement('a');
            a.className = 'note-pager__link note-pager__' + dir;
            a.href = '#' + encodeURI(path);
            const label = document.createElement('span');
            label.className = 'note-pager__label';
            label.textContent = dir === 'prev' ? '← Предыдущая' : 'Следующая →';
            const title = document.createElement('span');
            title.className = 'note-pager__title';
            title.textContent = TITLES[path] || titleFromPart(path.split('/').pop());
            a.appendChild(label);
            a.appendChild(title);
            a.addEventListener('click', (e) => { e.preventDefault(); selectAndLoad(path); });
            return a;
        }
        function buildPager(path) {
            const pager = $id('note-pager');
            if (!pager) return;
            const prev = neighbor(path, -1);
            const next = neighbor(path, 1);
            pager.innerHTML = '';
            if (!prev && !next) { pager.hidden = true; return; }
            pager.hidden = false;
            const spacer = () => { const s = document.createElement('span'); s.className = 'note-pager__spacer'; return s; };
            pager.appendChild(prev ? makePagerLink(prev, 'prev') : spacer());
            pager.appendChild(next ? makePagerLink(next, 'next') : spacer());
        }

        // ---- Load a note --------------------------------------------------
        let loadSeq = 0;          // newest wins — stale async loads bail out
        let inFlightPath = null;  // dedupe a concurrent load of the same note

        window.loadNote = async function (path) {
            const viewer = $id('note-viewer');
            if (!viewer) return;
            const p = normalizePath(path);
            if (p === inFlightPath) return;   // already loading this exact note
            const myId = ++loadSeq;
            inFlightPath = p;
            try {
                currentPath = p;
                const reader = $id('reader');
                const candidates = [p];
                if (/\.html?$/i.test(p)) candidates.push(p.replace(/\.html?$/i, '.md'));
                else if (/\.md$/i.test(p)) candidates.push(p.replace(/\.md$/i, '.html'));
                let loaded = false;
                for (const cand of candidates) {
                    try {
                        const url = (BASE || '') + cand;
                        let html;
                        if (/\.html?$/i.test(cand)) {
                            const pageHtml = await fetchText(url);
                            if (myId !== loadSeq) return;   // superseded by a newer load
                            const doc = new DOMParser().parseFromString(pageHtml, 'text/html');
                            const content = doc.querySelector('.post-content') || doc.body;
                            html = content.innerHTML;
                        } else {
                            const md = await fetchText(url);
                            if (myId !== loadSeq) return;
                            setupMarkedMath();
                            html = (window.marked && window.marked.parse) ? window.marked.parse(md) : md;
                        }
                        viewer.innerHTML = html;
                        rewriteRelativeResources(viewer, cand);
                        wrapTables(viewer);
                        // Build the outline, pager and reset scroll immediately — these
                        // don't depend on math, so don't wait for the async (and
                        // occasionally slow) MathJax bundle.
                        if (reader) reader.scrollTop = 0; else window.scrollTo(0, 0);
                        buildOutline();
                        buildPager(p);
                        updateProgress();
                        // Focus the reading pane so keyboard users can scroll it
                        // (the app-shell makes it the only scroll container).
                        if (reader) { try { reader.focus({ preventScroll: true }); } catch (e) { } }
                        await typesetMath(viewer);
                        if (myId !== loadSeq) return;
                        updateProgress();   // heights shift once equations render
                        loaded = true;
                        break;
                    } catch (e) {
                        if (myId !== loadSeq) return;
                    }
                }
                if (!loaded) {
                    viewer.innerHTML = `<p class="note-placeholder">Не удалось загрузить заметку: ${p}</p>`;
                    if (reader) reader.scrollTop = 0;
                    buildOutline();
                    buildPager(p);
                    updateProgress();
                }
            } finally {
                if (myId === loadSeq) inFlightPath = null;
            }
        };

        function selectAndLoad(p) {
            const path = normalizePath(p);
            currentPath = path;
            setActive(path);
            const newHash = '#' + encodeURI(path);
            if (location.hash === newHash) {
                if (window.loadNote) window.loadNote(path);
            } else {
                window.location.hash = newHash;
            }
        }

        // ---- Build + render -----------------------------------------------
        const treeNotes = toTree(NOTES);
        const treeEl = $id('tree-notes');
        renderTree(treeEl, treeNotes);
        ORDER = Array.from(treeEl.querySelectorAll('a[data-path]')).map(a => a.dataset.path);
        treeEl.querySelectorAll('a[data-path]').forEach(a => { TITLES[a.dataset.path] = a.textContent; });
        applyFolderState();

        // Persist folder expansion only on real user toggles. A summary click (or
        // Enter/Space, which fires a click) flips the native open state as its
        // default action, so read it back on the next frame.
        treeEl.addEventListener('click', (e) => {
            if (e.target.closest('summary')) requestAnimationFrame(persistOpen);
        });

        // Toolbar + filter bindings
        const filterEl = $id('notes-filter');
        if (filterEl) filterEl.addEventListener('input', () => filterTrees(filterEl.value));
        const expandBtn = $id('tree-expand');
        const collapseBtn = $id('tree-collapse');
        if (expandBtn) expandBtn.addEventListener('click', () => setAllFolders(true));
        if (collapseBtn) collapseBtn.addEventListener('click', () => setAllFolders(false));

        // Keyboard: "/" focuses filter, ←/→ walk between notes, Esc blurs filter.
        document.addEventListener('keydown', (e) => {
            const t = e.target;
            if (e.key === 'Escape' && t && t.id === 'notes-filter') { t.blur(); return; }
            const typing = t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.tagName === 'SELECT' || t.isContentEditable);
            if (e.metaKey || e.ctrlKey || e.altKey) return;
            if (e.key === '/' && !typing) { e.preventDefault(); if (filterEl) { filterEl.focus(); filterEl.select(); } return; }
            if (typing) return;
            if (e.key === 'ArrowLeft') { const p = neighbor(currentPath, -1); if (p) { e.preventDefault(); selectAndLoad(p); } }
            else if (e.key === 'ArrowRight') { const n = neighbor(currentPath, 1); if (n) { e.preventDefault(); selectAndLoad(n); } }
        });

        // Reader scroll → progress bar + outline scroll-spy (rAF-throttled)
        function wireReaderScroll() {
            const reader = $id('reader');
            if (!reader) return;
            let ticking = false;
            reader.addEventListener('scroll', () => {
                if (ticking) return;
                ticking = true;
                requestAnimationFrame(() => { updateProgress(); updateSpy(); ticking = false; });
            }, { passive: true });
        }

        // ---- Init ---------------------------------------------------------
        document.addEventListener('DOMContentLoaded', () => {
            wireReaderScroll();
            if (!location.hash) {
                const first = document.querySelector('#notes-explorer a[data-path]');
                if (first) selectAndLoad(first.dataset.path);
            } else {
                const hashPath = decodeURIComponent(location.hash.slice(1));
                setActive(normalizePath(hashPath));
            }
        });

        window.addEventListener('hashchange', () => {
            const hp = decodeURIComponent(location.hash.slice(1));
            if (!hp) return;
            setActive(normalizePath(hp));
        });
    })();
</script>
