---
layout: default
title: "Заметки"
---

<h1 class="sr-only">Просмотр заметок</h1>

<!-- Mobile toggle button -->
<button class="mobile-toggle" type="button" onclick="toggleMobileExplorer()" aria-controls="notes-explorer"
    aria-expanded="false" aria-label="Открыть каталог заметок">☰ Заметки</button>

<!-- Mobile overlay -->
<div class="mobile-overlay" id="mobile-overlay" onclick="closeMobileExplorer()" aria-hidden="true"></div>

<div class="notes-container">
    {% include notes-explorer.html %}

    <!-- Reading pane: the only region that scrolls in app-shell mode.
         tabindex/role make it keyboard-focusable so PageUp/Down/Space/arrows
         can scroll it (the app-shell removes the document scroll). -->
    <section class="reader" id="reader" tabindex="0" role="region" aria-label="Текст заметки">
        <div class="reading-progress" aria-hidden="true">
            <span class="reading-progress__bar" id="reading-bar"></span>
        </div>
        <article id="note-viewer" class="note-viewer">
            <p class="note-placeholder">Выберите заметку в панели слева.</p>
        </article>
        <nav class="note-pager" id="note-pager" aria-label="Соседние заметки" hidden></nav>
    </section>

    <!-- Auto-generated outline of the current note (hidden when it has no sections) -->
    <aside class="note-outline" id="note-outline" aria-label="Содержание заметки">
        <div class="note-outline__title">На этой странице</div>
        <nav class="note-outline__list" id="note-outline-list"></nav>
    </aside>
</div>

<!-- Markdown renderer -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    function loadNoteFromHash() {
        const hash = decodeURIComponent(location.hash || '');
        const path = hash.startsWith('#') ? hash.slice(1) : hash;
        if (!path) return;
        if (window.loadNote) window.loadNote(path);
    }
    window.addEventListener('hashchange', loadNoteFromHash);
    document.addEventListener('DOMContentLoaded', loadNoteFromHash);

    // Mobile explorer toggle functionality
    function setToggleExpanded(expanded) {
        const btn = document.querySelector('.mobile-toggle');
        if (btn) btn.setAttribute('aria-expanded', expanded ? 'true' : 'false');
    }

    function toggleMobileExplorer() {
        const explorer = document.querySelector('.notes-explorer');
        const overlay = document.getElementById('mobile-overlay');
        if (explorer && overlay) {
            if (explorer.classList.contains('open')) {
                closeMobileExplorer();
            } else {
                explorer.classList.add('open');
                overlay.classList.add('show');
                setToggleExpanded(true);
                // Announce as a modal drawer and move focus inside it.
                explorer.setAttribute('role', 'dialog');
                explorer.setAttribute('aria-modal', 'true');
                explorer.setAttribute('aria-label', 'Каталог заметок');
                // Focus the drawer itself (not the search field) so the keyboard
                // doesn't pop up and the page doesn't zoom when opening the catalog.
                explorer.setAttribute('tabindex', '-1');
                explorer.focus({ preventScroll: true });
            }
        }
    }

    function closeMobileExplorer() {
        const explorer = document.querySelector('.notes-explorer');
        const overlay = document.getElementById('mobile-overlay');
        if (explorer && overlay) {
            const wasOpen = explorer.classList.contains('open');
            explorer.classList.remove('open');
            overlay.classList.remove('show');
            setToggleExpanded(false);
            explorer.removeAttribute('role');
            explorer.removeAttribute('aria-modal');
            // Return focus to the trigger so keyboard/SR users aren't stranded.
            if (wasOpen) {
                const btn = document.querySelector('.mobile-toggle');
                if (btn) btn.focus();
            }
        }
    }

    // Close explorer when a note is selected on mobile
    document.addEventListener('DOMContentLoaded', function () {
        const explorer = document.querySelector('.notes-explorer');
        if (explorer) {
            explorer.addEventListener('click', function (e) {
                if (e.target.tagName === 'A' && window.innerWidth <= 900) {
                    setTimeout(closeMobileExplorer, 100);
                }
            });
        }

        // Add escape key handler
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                closeMobileExplorer();
            }
        });
    });
</script>
