<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'ru' }}">

{%- include head.html -%}

<body{% if page.title == 'Заметки' %} class="is-notes-app"{% endif %}>

  {%- include header.html -%}

  <main class="page-content{% if page.title == 'Заметки' %} notes-page{% endif %}" aria-label="Content">
    <div class="wrapper">
      <div class="post-content">
        {{ content }}
      </div>
    </div>
  </main>

  {%- include footer.html -%}

  <!-- MathJax v3 -->
  <script>
    // Resolves once the async MathJax bundle has finished its startup, so note
    // rendering can reliably await it even before the script has loaded.
    window.__mjReady = new Promise(function (resolve) { window.__mjReadyResolve = resolve; });
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true,
        processEnvironments: true
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
        ignoreHtmlClass: 'tex2jax_ignore',
        processHtmlClass: 'tex2jax_process'
      },
      chtml: {
        scale: 1,
        displayAlign: 'center'
      },
      startup: {
        typeset: false,
        ready: function () {
          window.MathJax.startup.defaultReady();
          if (window.__mjReadyResolve) window.__mjReadyResolve();
        }
      }
    };
  </script>
  <script async id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

</body>

</html>
